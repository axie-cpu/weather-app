<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e1a" />
  <meta name="description" content="Atmosphere — modern weather for any city" />
  <title>Atmosphere</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg0: #070b14;
      --bg1: #0c1424;
      --bg2: #152238;
      --bg3: #1e3a5f;
      --glow: #5eb0ff;
      --glow2: #a78bfa;
      --text: #f7f9fc;
      --muted: rgba(247, 249, 252, 0.58);
      --faint: rgba(247, 249, 252, 0.12);
      --glass: rgba(255, 255, 255, 0.055);
      --glass-hi: rgba(255, 255, 255, 0.09);
      --stroke: rgba(255, 255, 255, 0.12);
      --stroke-hi: rgba(255, 255, 255, 0.22);
      --accent: #9fd0ff;
      --ok: #7dd3c0;
      --danger: #ff9b9b;
      --r: 28px;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --shadow: 0 4px 24px rgba(0,0,0,0.18), 0 32px 80px rgba(0,0,0,0.28);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      min-height: 100dvh;
      font-family: Outfit, system-ui, sans-serif;
      color: var(--text);
      background: var(--bg0);
      overflow-x: hidden;
      line-height: 1.45;
    }

    /* Atmospheric mesh */
    .sky {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 90% 70% at 85% -10%, color-mix(in srgb, var(--glow) 45%, transparent), transparent 55%),
        radial-gradient(ellipse 70% 55% at -5% 90%, color-mix(in srgb, var(--glow2) 35%, transparent), transparent 50%),
        radial-gradient(ellipse 50% 40% at 50% 50%, color-mix(in srgb, var(--bg3) 40%, transparent), transparent 70%),
        linear-gradient(165deg, var(--bg0) 0%, var(--bg1) 40%, var(--bg2) 100%);
      transition: background 1s var(--ease);
    }
    .sky::after {
      content: "";
      position: absolute; inset: 0;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    body.theme-clear-day {
      --bg0: #0e2a52; --bg1: #1a4d8c; --bg2: #3d86c9; --bg3: #7eb8ef;
      --glow: #ffd27a; --glow2: #7ec8ff;
    }
    body.theme-clear-night {
      --bg0: #04060f; --bg1: #0a1024; --bg2: #141f3d; --bg3: #1c2a52;
      --glow: #6b8cff; --glow2: #c4b5fd;
    }
    body.theme-clouds {
      --bg0: #121820; --bg1: #1c2736; --bg2: #334155; --bg3: #5a6f88;
      --glow: #94a3b8; --glow2: #a5b4c8;
    }
    body.theme-rain {
      --bg0: #0a121c; --bg1: #132433; --bg2: #1e3a4f; --bg3: #2d5570;
      --glow: #5b9ec9; --glow2: #64748b;
    }
    body.theme-storm {
      --bg0: #06070e; --bg1: #101528; --bg2: #1a2040; --bg3: #2a3060;
      --glow: #818cf8; --glow2: #c084fc;
    }
    body.theme-snow {
      --bg0: #121a26; --bg1: #243447; --bg2: #4a627a; --bg3: #8fa8c0;
      --glow: #e2e8f0; --glow2: #93c5fd;
    }
    body.theme-fog {
      --bg0: #1a1d24; --bg1: #2d3340; --bg2: #4b5563; --bg3: #8b95a5;
      --glow: #cbd5e1; --glow2: #94a3b8;
    }

    .app {
      position: relative; z-index: 1;
      width: min(440px, 100%);
      margin: 0 auto;
      padding: max(20px, env(safe-area-inset-top)) 18px max(40px, env(safe-area-inset-bottom));
    }

    /* Header */
    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 22px;
    }
    .brand {
      display: flex; align-items: baseline; gap: 8px;
    }
    .brand-mark {
      width: 28px; height: 28px; border-radius: 9px;
      background: linear-gradient(135deg, var(--glow), var(--glow2));
      box-shadow: 0 0 24px color-mix(in srgb, var(--glow) 45%, transparent);
      position: relative;
    }
    .brand-mark::after {
      content: "";
      position: absolute; inset: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.85);
      box-shadow: 4px 2px 0 -1px rgba(7,11,20,0.35);
    }
    .brand h1 {
      font-family: "Instrument Serif", Georgia, serif;
      font-weight: 400;
      font-size: 1.55rem;
      letter-spacing: -0.02em;
    }
    .brand h1 em {
      font-style: italic;
      opacity: 0.72;
      font-size: 0.92em;
    }

    .unit-toggle {
      display: inline-flex;
      padding: 3px;
      border-radius: 999px;
      background: var(--glass);
      border: 1px solid var(--stroke);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
    }
    .unit-toggle button {
      border: 0; background: transparent;
      color: var(--muted);
      font: inherit; font-weight: 600; font-size: 0.82rem;
      padding: 8px 13px; border-radius: 999px;
      cursor: pointer;
      transition: all 0.25s var(--ease);
    }
    .unit-toggle button.active {
      background: rgba(255,255,255,0.16);
      color: var(--text);
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }

    /* Search */
    .search-shell {
      position: relative;
      margin-bottom: 8px;
    }
    .search-row { display: flex; gap: 10px; }
    .search-wrap { flex: 1; position: relative; }
    .search-wrap input {
      width: 100%;
      border: 1px solid var(--stroke);
      background: var(--glass);
      backdrop-filter: blur(24px) saturate(1.5);
      -webkit-backdrop-filter: blur(24px) saturate(1.5);
      color: var(--text);
      font: inherit; font-size: 0.98rem; font-weight: 400;
      padding: 15px 16px 15px 46px;
      border-radius: 18px;
      outline: none;
      box-shadow: var(--shadow);
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-wrap input:focus {
      border-color: var(--stroke-hi);
      background: var(--glass-hi);
      box-shadow: var(--shadow), 0 0 0 4px color-mix(in srgb, var(--glow) 18%, transparent);
    }
    .search-icon {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
      display: grid; place-items: center;
    }
    .icon-btn {
      width: 52px; flex-shrink: 0;
      border: 1px solid var(--stroke);
      background: var(--glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      color: var(--text);
      border-radius: 18px;
      cursor: pointer;
      display: grid; place-items: center;
      box-shadow: var(--shadow);
      transition: transform 0.2s var(--ease), background 0.2s, border-color 0.2s;
    }
    .icon-btn:hover { background: var(--glass-hi); border-color: var(--stroke-hi); }
    .icon-btn:active { transform: scale(0.96); }
    .icon-btn:disabled { opacity: 0.45; cursor: wait; }
    .icon-btn.spinning svg { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .suggestions {
      list-style: none;
      position: absolute; left: 0; right: 62px; top: calc(100% + 8px);
      z-index: 20;
      background: rgba(10, 14, 26, 0.88);
      border: 1px solid var(--stroke);
      border-radius: 18px;
      overflow: hidden;
      backdrop-filter: blur(28px) saturate(1.4);
      -webkit-backdrop-filter: blur(28px) saturate(1.4);
      box-shadow: var(--shadow);
      display: none;
      max-height: 280px; overflow-y: auto;
    }
    .suggestions.open { display: block; animation: drop 0.28s var(--ease); }
    @keyframes drop {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: none; }
    }
    .suggestions li {
      padding: 13px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--faint);
      transition: background 0.15s;
    }
    .suggestions li:last-child { border-bottom: 0; }
    .suggestions li:hover, .suggestions li.active { background: rgba(255,255,255,0.07); }
    .suggestions li strong { font-weight: 600; font-size: 0.95rem; }
    .suggestions li small { display: block; color: var(--muted); font-size: 0.78rem; margin-top: 2px; font-weight: 400; }

    .status {
      min-height: 22px;
      margin: 10px 2px 14px;
      color: var(--muted);
      font-size: 0.84rem; font-weight: 400;
      display: flex; align-items: center; gap: 8px;
    }
    .status.error { color: var(--danger); }
    .status .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      animation: pulse 1.4s ease infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.75); }
    }

    /* Cards */
    .card {
      position: relative;
      border-radius: var(--r);
      background: var(--glass);
      border: 1px solid var(--stroke);
      backdrop-filter: blur(28px) saturate(1.5);
      -webkit-backdrop-filter: blur(28px) saturate(1.5);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 14px;
      animation: rise 0.55s var(--ease) both;
    }
    .card::before {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 42%, transparent 100%);
      pointer-events: none;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(16px) scale(0.985); }
      to { opacity: 1; transform: none; }
    }
    .card.d1 { animation-delay: 0.05s; }
    .card.d2 { animation-delay: 0.12s; }
    .card.d3 { animation-delay: 0.18s; }

    /* Hero */
    .hero { padding: 28px 24px 22px; }
    .hero-top {
      display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
      margin-bottom: 8px;
    }
    .place {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: clamp(1.75rem, 6vw, 2.15rem);
      font-weight: 400;
      letter-spacing: -0.025em;
      line-height: 1.1;
    }
    .place-meta {
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 400;
      margin-top: 6px;
    }
    .wx-badge {
      flex-shrink: 0;
      width: 64px; height: 64px;
      border-radius: 20px;
      background: linear-gradient(145deg, rgba(255,255,255,0.14), rgba(255,255,255,0.03));
      border: 1px solid var(--stroke);
      display: grid; place-items: center;
      font-size: 2rem;
      animation: float 4s ease-in-out infinite;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.15);
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }

    .temp-block { margin: 18px 0 6px; }
    .temp {
      font-weight: 300;
      font-size: clamp(5.2rem, 18vw, 6.4rem);
      line-height: 0.85;
      letter-spacing: -0.05em;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(180deg, #fff 30%, rgba(255,255,255,0.72));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .temp sup {
      font-size: 0.28em;
      font-weight: 400;
      vertical-align: super;
      letter-spacing: 0;
      margin-left: 2px;
      color: rgba(255,255,255,0.7);
      -webkit-text-fill-color: rgba(255,255,255,0.7);
    }
    .condition-line {
      display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px 14px;
      margin-top: 10px;
    }
    .condition-line .label {
      font-size: 1.12rem;
      font-weight: 500;
    }
    .condition-line .feels {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid var(--faint);
    }
    @media (max-width: 400px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
    }
    .stat {
      padding: 10px 8px;
      border-radius: 14px;
      background: rgba(0,0,0,0.14);
      text-align: center;
    }
    .stat .ico {
      font-size: 0.95rem;
      margin-bottom: 4px;
      opacity: 0.85;
    }
    .stat .k {
      color: var(--muted);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 500;
      margin-bottom: 3px;
    }
    .stat .v {
      font-weight: 600;
      font-size: 0.95rem;
      font-variant-numeric: tabular-nums;
    }

    /* Panels */
    .panel { padding: 18px 16px 16px; }
    .panel-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
      padding: 0 4px;
    }
    .panel-head h2 {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-weight: 600;
    }
    .panel-head .hint {
      font-size: 0.72rem;
      color: var(--muted);
      opacity: 0.7;
    }

    .hourly {
      display: flex; gap: 8px;
      overflow-x: auto;
      padding: 2px 2px 10px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .hourly::-webkit-scrollbar { display: none; }

    .hour {
      flex: 0 0 70px;
      scroll-snap-align: start;
      text-align: center;
      background: rgba(0,0,0,0.16);
      border: 1px solid transparent;
      border-radius: 18px;
      padding: 14px 8px 12px;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }
    .hour.now {
      background: linear-gradient(160deg, color-mix(in srgb, var(--glow) 28%, transparent), rgba(255,255,255,0.06));
      border-color: var(--stroke-hi);
      box-shadow: 0 0 20px color-mix(in srgb, var(--glow) 18%, transparent);
    }
    .hour .t {
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 8px;
    }
    .hour.now .t { color: var(--text); }
    .hour .e { font-size: 1.35rem; margin-bottom: 8px; line-height: 1; }
    .hour .d {
      font-weight: 600;
      font-size: 0.98rem;
      font-variant-numeric: tabular-nums;
    }
    .hour .p {
      font-size: 0.68rem;
      color: var(--accent);
      margin-top: 5px;
      font-weight: 500;
    }

    .daily { display: flex; flex-direction: column; gap: 2px; }
    .day {
      display: grid;
      grid-template-columns: 52px 36px 1fr 72px;
      align-items: center;
      gap: 8px;
      padding: 11px 10px;
      border-radius: 14px;
      transition: background 0.15s;
    }
    .day:hover { background: rgba(255,255,255,0.04); }
    .day .name {
      font-weight: 600;
      font-size: 0.92rem;
    }
    .day .emoji { text-align: center; font-size: 1.2rem; }
    .day .bar-wrap {
      display: flex; align-items: center; gap: 8px;
      min-width: 0;
    }
    .day .pop {
      font-size: 0.72rem;
      color: var(--accent);
      font-weight: 500;
      width: 28px;
      flex-shrink: 0;
    }
    .day .bar {
      flex: 1;
      height: 5px;
      border-radius: 99px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
      position: relative;
    }
    .day .bar > i {
      position: absolute; top: 0; bottom: 0;
      border-radius: 99px;
      background: linear-gradient(90deg, color-mix(in srgb, var(--glow2) 70%, white), var(--glow));
      opacity: 0.85;
    }
    .day .range {
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-size: 0.9rem;
    }
    .day .range .hi { font-weight: 600; }
    .day .range .lo { color: var(--muted); margin-left: 6px; font-weight: 400; }

    .hidden { display: none !important; }

    footer {
      margin-top: 22px;
      text-align: center;
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 400;
      opacity: 0.85;
    }
    footer a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }
    footer a:hover { border-bottom-color: var(--accent); }

    /* Skeleton */
    .skel {
      background: linear-gradient(90deg, rgba(255,255,255,0.04), rgba(255,255,255,0.09), rgba(255,255,255,0.04));
      background-size: 200% 100%;
      animation: shimmer 1.4s ease infinite;
      border-radius: 10px;
    }
    @keyframes shimmer {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }
  </style>
</head>
<body class="theme-clouds">
  <div class="sky" aria-hidden="true"></div>

  <div class="app">
    <header>
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <h1>Atmosphere <em>weather</em></h1>
      </div>
      <div class="unit-toggle" role="group" aria-label="Temperature unit">
        <button type="button" id="unitC" class="active">°C</button>
        <button type="button" id="unitF">°F</button>
      </div>
    </header>

    <div class="search-shell">
      <div class="search-row">
        <div class="search-wrap">
          <span class="search-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.2-3.2"/></svg>
          </span>
          <input id="search" type="search" placeholder="Search any city…" autocomplete="off" enterkeyhint="search" spellcheck="false" />
        </div>
        <button type="button" class="icon-btn" id="geoBtn" title="Use my location" aria-label="Use my location">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <circle cx="12" cy="12" r="3"/><path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22"/>
          </svg>
        </button>
      </div>
      <ul class="suggestions" id="suggestions" role="listbox"></ul>
    </div>

    <div class="status" id="status"><span class="dot"></span> Loading San Francisco…</div>

    <section class="card hero hidden" id="hero">
      <div class="hero-top">
        <div>
          <div class="place" id="placeName">—</div>
          <div class="place-meta" id="placeMeta">—</div>
        </div>
        <div class="wx-badge" id="emoji" aria-hidden="true">🌤️</div>
      </div>
      <div class="temp-block">
        <div class="temp" id="temp">—<sup>°</sup></div>
        <div class="condition-line">
          <span class="label" id="conditionLabel">—</span>
          <span class="feels" id="feels">—</span>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><div class="ico">💧</div><div class="k">Humidity</div><div class="v" id="humidity">—</div></div>
        <div class="stat"><div class="ico">💨</div><div class="k">Wind</div><div class="v" id="wind">—</div></div>
        <div class="stat"><div class="ico">◎</div><div class="k">Pressure</div><div class="v" id="pressure">—</div></div>
        <div class="stat"><div class="ico">🌧</div><div class="k">Precip</div><div class="v" id="precip">—</div></div>
      </div>
    </section>

    <section class="card panel d2 hidden" id="hourlyPanel">
      <div class="panel-head">
        <h2>Hourly</h2>
        <span class="hint">swipe →</span>
      </div>
      <div class="hourly" id="hourly"></div>
    </section>

    <section class="card panel d3 hidden" id="dailyPanel">
      <div class="panel-head">
        <h2>This week</h2>
      </div>
      <div class="daily" id="daily"></div>
    </section>

    <footer>
      Powered by <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a>
    </footer>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const state = {
      unit: localStorage.getItem("wx-unit") || "c",
      place: null,
      weather: null,
      suggestTimer: null,
      activeSuggest: -1,
    };

    const WMO = {
      0:  { label: "Clear sky", emoji: "☀️", theme: "clear" },
      1:  { label: "Mainly clear", emoji: "🌤️", theme: "clear" },
      2:  { label: "Partly cloudy", emoji: "⛅", theme: "clouds" },
      3:  { label: "Overcast", emoji: "☁️", theme: "clouds" },
      45: { label: "Fog", emoji: "🌫️", theme: "fog" },
      48: { label: "Rime fog", emoji: "🌫️", theme: "fog" },
      51: { label: "Light drizzle", emoji: "🌦️", theme: "rain" },
      53: { label: "Drizzle", emoji: "🌦️", theme: "rain" },
      55: { label: "Heavy drizzle", emoji: "🌧️", theme: "rain" },
      56: { label: "Freezing drizzle", emoji: "🌧️", theme: "rain" },
      57: { label: "Freezing drizzle", emoji: "🌧️", theme: "rain" },
      61: { label: "Slight rain", emoji: "🌧️", theme: "rain" },
      63: { label: "Rain", emoji: "🌧️", theme: "rain" },
      65: { label: "Heavy rain", emoji: "🌧️", theme: "rain" },
      66: { label: "Freezing rain", emoji: "🌧️", theme: "rain" },
      67: { label: "Freezing rain", emoji: "🌧️", theme: "rain" },
      71: { label: "Slight snow", emoji: "🌨️", theme: "snow" },
      73: { label: "Snow", emoji: "❄️", theme: "snow" },
      75: { label: "Heavy snow", emoji: "❄️", theme: "snow" },
      77: { label: "Snow grains", emoji: "🌨️", theme: "snow" },
      80: { label: "Rain showers", emoji: "🌦️", theme: "rain" },
      81: { label: "Rain showers", emoji: "🌧️", theme: "rain" },
      82: { label: "Violent showers", emoji: "⛈️", theme: "storm" },
      85: { label: "Snow showers", emoji: "🌨️", theme: "snow" },
      86: { label: "Snow showers", emoji: "❄️", theme: "snow" },
      95: { label: "Thunderstorm", emoji: "⛈️", theme: "storm" },
      96: { label: "Thunderstorm + hail", emoji: "⛈️", theme: "storm" },
      99: { label: "Thunderstorm + hail", emoji: "⛈️", theme: "storm" },
    };

    function wmo(code) {
      return WMO[code] || { label: "Unknown", emoji: "🌡️", theme: "clouds" };
    }
    function toF(c) { return (c * 9) / 5 + 32; }
    function fmtTemp(c) {
      const n = state.unit === "f" ? toF(c) : c;
      return Math.round(n);
    }
    function unitSym() { return state.unit === "f" ? "°F" : "°C"; }

    function setStatus(msg, isError = false, loading = false) {
      const el = $("status");
      if (!msg) { el.innerHTML = ""; el.classList.remove("error"); return; }
      el.classList.toggle("error", isError);
      el.innerHTML = loading ? `<span class="dot"></span> ${msg}` : msg;
    }

    function setUnitUI() {
      $("unitC").classList.toggle("active", state.unit === "c");
      $("unitF").classList.toggle("active", state.unit === "f");
    }

    function applyTheme(code, isDay) {
      const t = wmo(code).theme;
      let cls = "theme-clouds";
      if (t === "clear") cls = isDay ? "theme-clear-day" : "theme-clear-night";
      else if (t === "rain") cls = "theme-rain";
      else if (t === "storm") cls = "theme-storm";
      else if (t === "snow") cls = "theme-snow";
      else if (t === "fog") cls = "theme-fog";
      document.body.className = cls;
    }

    async function searchCities(q) {
      const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=6&language=en&format=json`;
      const res = await fetch(url);
      if (!res.ok) throw new Error("Search failed");
      const data = await res.json();
      return data.results || [];
    }

    async function fetchWeather(lat, lon) {
      const params = new URLSearchParams({
        latitude: lat,
        longitude: lon,
        current: "temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,surface_pressure,precipitation,is_day",
        hourly: "temperature_2m,weather_code,precipitation_probability",
        daily: "weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max",
        timezone: "auto",
        forecast_days: "7",
      });
      const res = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
      if (!res.ok) throw new Error("Weather request failed");
      return res.json();
    }

    function render() {
      if (!state.place || !state.weather) return;
      const p = state.place;
      const w = state.weather;
      const cur = w.current;
      const meta = wmo(cur.weather_code);

      ["hero", "hourlyPanel", "dailyPanel"].forEach((id) => $(id).classList.remove("hidden"));

      // re-trigger animation
      ["hero", "hourlyPanel", "dailyPanel"].forEach((id) => {
        const el = $(id);
        el.style.animation = "none";
        void el.offsetWidth;
        el.style.animation = "";
      });

      $("placeName").textContent = p.name;
      $("placeMeta").textContent = [p.admin1, p.country].filter(Boolean).join(" · ");
      $("temp").innerHTML = `${fmtTemp(cur.temperature_2m)}<sup>°</sup>`;
      $("emoji").textContent = meta.emoji;
      $("conditionLabel").textContent = meta.label;
      $("feels").textContent = `Feels like ${fmtTemp(cur.apparent_temperature)}${unitSym()}`;
      $("humidity").textContent = `${cur.relative_humidity_2m}%`;
      $("wind").textContent = `${Math.round(cur.wind_speed_10m)}`;
      $("wind").innerHTML = `${Math.round(cur.wind_speed_10m)}<span style="font-size:0.7em;opacity:.65;font-weight:500"> km/h</span>`;
      $("pressure").textContent = Math.round(cur.surface_pressure);
      $("precip").innerHTML = `${cur.precipitation ?? 0}<span style="font-size:0.7em;opacity:.65;font-weight:500"> mm</span>`;

      applyTheme(cur.weather_code, cur.is_day === 1);

      const now = new Date(cur.time);
      const hours = [];
      for (let i = 0; i < w.hourly.time.length && hours.length < 24; i++) {
        const t = new Date(w.hourly.time[i]);
        if (t >= now) {
          hours.push({
            time: t,
            temp: w.hourly.temperature_2m[i],
            code: w.hourly.weather_code[i],
            pop: w.hourly.precipitation_probability[i],
          });
        }
      }
      $("hourly").innerHTML = hours.slice(0, 18).map((h, idx) => {
        const label = idx === 0 ? "Now" : h.time.toLocaleTimeString([], { hour: "numeric" });
        const m = wmo(h.code);
        const pop = h.pop > 0 ? `<div class="p">${h.pop}%</div>` : "";
        return `<div class="hour${idx === 0 ? " now" : ""}"><div class="t">${label}</div><div class="e">${m.emoji}</div><div class="d">${fmtTemp(h.temp)}°</div>${pop}</div>`;
      }).join("");

      const days = w.daily.time.map((d, i) => ({
        date: new Date(d + "T12:00:00"),
        code: w.daily.weather_code[i],
        max: w.daily.temperature_2m_max[i],
        min: w.daily.temperature_2m_min[i],
        pop: w.daily.precipitation_probability_max[i] ?? 0,
      }));
      const allMin = Math.min(...days.map((d) => d.min));
      const allMax = Math.max(...days.map((d) => d.max));
      const span = Math.max(allMax - allMin, 1);

      $("daily").innerHTML = days.map((d, i) => {
        const name = i === 0 ? "Today" : d.date.toLocaleDateString([], { weekday: "short" });
        const m = wmo(d.code);
        const left = ((d.min - allMin) / span) * 100;
        const width = ((d.max - d.min) / span) * 100;
        const popTxt = d.pop > 0 ? `${d.pop}%` : "";
        return `<div class="day">
          <div class="name">${name}</div>
          <div class="emoji">${m.emoji}</div>
          <div class="bar-wrap">
            <span class="pop">${popTxt}</span>
            <div class="bar"><i style="left:${left}%;width:${Math.max(width, 8)}%"></i></div>
          </div>
          <div class="range"><span class="hi">${fmtTemp(d.max)}°</span><span class="lo">${fmtTemp(d.min)}°</span></div>
        </div>`;
      }).join("");
    }

    async function loadPlace(place) {
      state.place = place;
      setStatus(`Loading ${place.name}…`, false, true);
      try {
        state.weather = await fetchWeather(place.latitude, place.longitude);
        setStatus("");
        render();
      } catch (e) {
        setStatus(e.message || "Could not load weather", true);
      }
    }

    function showSuggestions(results) {
      const box = $("suggestions");
      state.activeSuggest = -1;
      if (!results.length) {
        box.classList.remove("open");
        box.innerHTML = "";
        return;
      }
      box.innerHTML = results.map((r, i) => {
        const sub = [r.admin1, r.country].filter(Boolean).join(", ");
        return `<li role="option" data-i="${i}"><strong>${r.name}</strong><small>${sub}</small></li>`;
      }).join("");
      box._results = results;
      box.classList.add("open");
      box.querySelectorAll("li").forEach((li) => {
        li.addEventListener("click", () => {
          const r = results[+li.dataset.i];
          box.classList.remove("open");
          $("search").value = r.name;
          loadPlace(r);
        });
      });
    }

    $("search").addEventListener("input", (e) => {
      const q = e.target.value.trim();
      clearTimeout(state.suggestTimer);
      if (q.length < 2) { showSuggestions([]); return; }
      state.suggestTimer = setTimeout(async () => {
        try { showSuggestions(await searchCities(q)); }
        catch { showSuggestions([]); }
      }, 260);
    });

    $("search").addEventListener("keydown", async (e) => {
      const box = $("suggestions");
      const items = [...box.querySelectorAll("li")];
      if (e.key === "ArrowDown" && items.length) {
        e.preventDefault();
        state.activeSuggest = Math.min(state.activeSuggest + 1, items.length - 1);
        items.forEach((el, i) => el.classList.toggle("active", i === state.activeSuggest));
      } else if (e.key === "ArrowUp" && items.length) {
        e.preventDefault();
        state.activeSuggest = Math.max(state.activeSuggest - 1, 0);
        items.forEach((el, i) => el.classList.toggle("active", i === state.activeSuggest));
      } else if (e.key === "Enter") {
        e.preventDefault();
        if (state.activeSuggest >= 0 && box._results?.[state.activeSuggest]) {
          const r = box._results[state.activeSuggest];
          box.classList.remove("open");
          $("search").value = r.name;
          loadPlace(r);
          return;
        }
        const q = $("search").value.trim();
        if (!q) return;
        setStatus("Searching…", false, true);
        try {
          const results = await searchCities(q);
          if (!results.length) { setStatus("No cities found", true); return; }
          showSuggestions([]);
          $("search").value = results[0].name;
          loadPlace(results[0]);
        } catch { setStatus("Search failed", true); }
      } else if (e.key === "Escape") showSuggestions([]);
    });

    document.addEventListener("click", (e) => {
      if (!e.target.closest(".search-shell")) showSuggestions([]);
    });

    $("unitC").addEventListener("click", () => {
      state.unit = "c"; localStorage.setItem("wx-unit", "c"); setUnitUI(); render();
    });
    $("unitF").addEventListener("click", () => {
      state.unit = "f"; localStorage.setItem("wx-unit", "f"); setUnitUI(); render();
    });

    $("geoBtn").addEventListener("click", () => {
      if (!navigator.geolocation) { setStatus("Geolocation not supported", true); return; }
      $("geoBtn").disabled = true;
      $("geoBtn").classList.add("spinning");
      setStatus("Finding you…", false, true);
      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          try {
            const { latitude, longitude } = pos.coords;
            const place = {
              name: "My location",
              admin1: `${latitude.toFixed(2)}°, ${longitude.toFixed(2)}°`,
              country: "",
              latitude, longitude,
            };
            try {
              const r = await fetch(
                `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${latitude}&longitude=${longitude}&localityLanguage=en`
              );
              if (r.ok) {
                const j = await r.json();
                place.name = j.city || j.locality || j.principalSubdivision || "My location";
                place.admin1 = j.principalSubdivision || "";
                place.country = j.countryName || "";
              }
            } catch {}
            await loadPlace(place);
          } catch {
            setStatus("Could not load local weather", true);
          } finally {
            $("geoBtn").disabled = false;
            $("geoBtn").classList.remove("spinning");
          }
        },
        (err) => {
          $("geoBtn").disabled = false;
          $("geoBtn").classList.remove("spinning");
          setStatus(err.message || "Location denied", true);
        },
        { enableHighAccuracy: false, timeout: 12000 }
      );
    });

    setUnitUI();
    loadPlace({
      name: "San Francisco",
      admin1: "California",
      country: "United States",
      latitude: 37.77493,
      longitude: -122.41942,
    });
  </script>
</body>
</html>
